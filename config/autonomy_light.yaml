autonomy_light:
  ros__parameters:
    # User-facing setup: pose of the MID360 LiDAR frame in the target frame.
    target_frame: "base_link"
    height_map_frame: "base_link_gravity"
    lidar_frame: "mid360"
    target_to_lidar_xyz: [0.0, 0.0, 0.30]
    target_to_lidar_rpy: [0.0, 0.0, 0.0]

    # User-facing setup: robot-centric elevation map geometry.
    elevation_resolution: 0.05
    elevation_x_length: 1.2
    elevation_y_length: 1.2
    height_origin:
      # local_floor keeps the height map from riding on small odom z jitter caused by roll/pitch.
      # Use odom for the old behavior, or fixed for a map-level z origin.
      mode: "local_floor"
      fixed_z: 0.0
      filter_alpha: 0.25
      max_step: 0.03
      floor_radius: 0.6
      floor_percentile: 0.20
      floor_min_points: 20
    publish_rate_hz: 50.0

    # ROS 2 domain split: keep heavy perception internal, publish only control-facing
    # outputs on the external domain. Set debug_local_map_ros_domain_id to the
    # internal domain to keep local_map private, or to the external domain to view it there.
    internal_ros_domain_id: 42
    external_ros_domain_id: 0
    debug_local_map_ros_domain_id: 0
    debug_local_map_topic: "/point_lio/local_map"

    # Optional defaults for MID360 + Point-LIO integration.
    livox_interface: "enP8p1s0"
    livox_host_ip: "192.168.1.50/24"
    livox_lidar_ip: "192.168.1.166"
    raw_lidar_topic: "/livox/lidar"
    raw_imu_topic: "/livox/imu"
    monitor_raw_lidar: false
    point_lio_odom_topic: "/aft_mapped_to_init"
    point_lio_map_topic: "/point_lio/local_map"
    point_lio_path_topic: "/path"
    point_lio_registered_topic: "/cloud_registered"
    odom_output_topic: "/autonomy_light/odom"
    height_map_topic: "/autonomy_light/height_map"
    path_output_topic: "/path"
    interpolation_max_passes: 2
    interpolation_min_neighbors: 3
    fill_remaining_height: 0.0
    algorithm:
      cloud_registered_fill:
        enabled: false
        percentile: 0.15
        min_points_per_cell: 2
        initial_floor_fill_enabled: true
        initial_floor_max_local_coverage: 0.25
        floor_min_points: 20
        floor_support_band: 0.08
        initial_keep_min_support: 3
      frame_aggregation:
        robust_height_gate: 0.04
        intra_cell_min_support_gap: 0.025
        intra_cell_min_support_count: 3
        edge_mix_height_diff: 0.035
        edge_prefer_prev_support_count: 1
        cell_height_percentile: 0.15
        temporal_alpha: 1.0
      isolated_filter:
        radius: 0
        min_support_neighbors: 2
        support_height_diff: 0.025
        outlier_height_diff: 0.05
        every_n_frames: 2
      hole_fill:
        radius: 1
        min_neighbors: 4
        max_height_diff: 0.015
      bilateral:
        radius: 1
        sigma_spatial: 1.1
        sigma_height: 0.015
        max_height_diff: 0.025
        passes: 0
        every_n_frames: 2
    start_lidar_driver: true
    start_point_lio: true
    child_use_sim_time: false
