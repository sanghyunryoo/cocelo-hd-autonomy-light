autonomy_light:
  ros__parameters:
    # User-facing setup: pose of the MID360 LiDAR frame in the target frame.
    target_frame: "base_link"
    height_map_frame: "base_link_gravity"
    lidar_frame: "mid360"
    target_to_lidar_xyz: [0.0, 0.0, 0.30]
    target_to_lidar_rpy: [0.0, 0.0, 0.0]

    # User-facing setup: robot-centric elevation map geometry.
    elevation_resolution: 0.1
    elevation_x_length: 1.2
    elevation_y_length: 1.2
    publish_rate_hz: 50.0

    # Optional defaults for MID360 + Point-LIO integration.
    raw_lidar_topic: "/livox/lidar"
    raw_imu_topic: "/livox/imu"
    point_lio_odom_topic: "/aft_mapped_to_init"
    point_lio_map_topic: "/point_lio/local_map"
    odom_output_topic: "/autonomy_light/odom"
    height_map_topic: "/autonomy_light/height_map"
    interpolation_max_passes: 8
    interpolation_min_neighbors: 1
    fill_remaining_height: 0.0
    algorithm:
      frame_aggregation:
        robust_height_gate: 0.04
        intra_cell_min_support_gap: 0.025
        intra_cell_min_support_count: 3
        edge_mix_height_diff: 0.035
        edge_prefer_prev_support_count: 2
        cell_height_percentile: 0.30
        temporal_alpha: 0.65
      isolated_filter:
        radius: 1
        min_support_neighbors: 2
        support_height_diff: 0.025
        outlier_height_diff: 0.05
        every_n_frames: 2
      hole_fill:
        radius: 1
        min_neighbors: 3
        max_height_diff: 0.03
      bilateral:
        radius: 1
        sigma_spatial: 1.1
        sigma_height: 0.025
        max_height_diff: 0.04
        passes: 2
        every_n_frames: 2
    start_lidar_driver: true
    start_point_lio: true
    child_use_sim_time: false
